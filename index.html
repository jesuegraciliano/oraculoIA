<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente de Dúvidas · IA Acadêmica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="app-header">
    <div class="container">
      <h1>Portal do Aluno · Suporte com IA</h1>
      <p class="subtitle">Envie suas dúvidas sobre a matéria e receba orientações didáticas instantâneas.</p>
    </div>
  </header>

  <main class="container app-main">
    <section class="chat-container">
      <div id="chat-window" class="chat-window">
        <div class="message system-message">
          <p>Olá! Sou seu assistente de IA. Em que posso te ajudar com os estudos hoje?</p>
        </div>
      </div>
    </section>

    <section class="input-container">
      <form id="form-duvida" onsubmit="enviarDuvida(event)">
        <textarea id="input-student" placeholder="Digite aqui sua dúvida pedagógica... (Ex: Qual a diferença entre ciclo de compressão e absorção?)" required></textarea>
        <div class="actions">
          <button type="submit" class="btn btn-primary" id="btn-enviar">Perguntar à IA ✨</button>
        </div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
